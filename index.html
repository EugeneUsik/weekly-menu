<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Семейное меню на неделю">
  <title>Меню</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="nav" id="nav">
    <div class="nav-top">
      <label for="week-select" class="nav-week-label">Неделя:</label>
      <select id="week-select" class="nav-week-select"></select>
    </div>
    <div class="nav-tabs" role="tablist">
      <button class="nav-tab active" role="tab" data-screen="menu" aria-selected="true">Меню</button>
      <button class="nav-tab" role="tab" data-screen="shopping" aria-selected="false">Покупки</button>
      <button class="nav-tab" role="tab" data-screen="recipes" aria-selected="false">Рецепты</button>
    </div>
  </nav>

  <main class="main">

    <section id="screen-menu" class="screen screen--active" role="tabpanel">
      <div id="menu-content" class="menu-grid-wrapper"></div>
    </section>

    <section id="screen-shopping" class="screen" role="tabpanel">
      <div class="shopping-actions">
        <button id="btn-check-all" class="btn btn--secondary">Отметить всё</button>
        <button id="btn-reset" class="btn btn--secondary">Сбросить</button>
      </div>
      <div id="shopping-content"></div>
    </section>

    <section id="screen-recipes" class="screen" role="tabpanel">
      <div class="recipe-filters" id="recipe-filters" role="tablist">
        <button class="filter-tab active" data-filter="all">Все</button>
        <button class="filter-tab" data-filter="breakfast">Завтраки</button>
        <button class="filter-tab" data-filter="lunch">Обеды</button>
        <button class="filter-tab" data-filter="dinner">Ужины</button>
        <button class="filter-tab" data-filter="snack">Перекусы</button>
        <button class="filter-tab" data-filter="favorites">&#9829; Избранное</button>
      </div>
      <div id="recipes-content"></div>
    </section>

  </main>

  <div id="recipe-modal" class="modal" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-content" id="modal-content"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
